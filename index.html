<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Is this worth building? — Survey Analysis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0a2540; --body:#425466; --muted:#697386;
  --paper:#fff; --surface:#f6f9fc; --line:#e3e8ef; --line-soft:#edf2f7;
  --purple:#635bff; --purple-soft:#ede9ff;
  --green:#0fa37f;  --green-soft:#d7f5ee;
  --red:#ed5f74;    --red-soft:#fde8ec;
  --amber:#e3a21a;  --amber-soft:#fef3d0;
  --blue:#1a56db;   --blue-soft:#dbeafe;
  --shadow-sm:0 1px 3px rgba(10,37,64,.07),0 1px 2px rgba(10,37,64,.04);
  --shadow-md:0 4px 16px rgba(10,37,64,.09),0 2px 4px rgba(10,37,64,.04);
  --r:8px;
  --sans:'Inter',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--paper);color:var(--body);font-family:var(--sans);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;}
a{color:var(--purple);text-decoration:none;}

/* ── LAYOUT ── */
.page{max-width:1160px;margin:0 auto;padding:0 32px 120px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.g21{display:grid;grid-template-columns:2fr 1fr;gap:16px;}
.g12{display:grid;grid-template-columns:1fr 2fr;gap:16px;}
@media(max-width:860px){.g2,.g3,.g4,.g21,.g12{grid-template-columns:1fr;}}

/* ── TOP NAV ── */
.topnav{
  display:flex;justify-content:space-between;align-items:center;
  padding:24px 0 20px;border-bottom:1px solid var(--line);
  margin-bottom:48px;flex-wrap:wrap;gap:12px;
}
.topnav h1{font-size:22px;font-weight:600;color:var(--ink);letter-spacing:-.4px;}
.topnav-right{display:flex;align-items:center;gap:16px;}
.live-badge{
  display:flex;align-items:center;gap:6px;
  font-size:12px;font-weight:500;color:var(--muted);
}
.live-dot{width:7px;height:7px;border-radius:50%;background:#c4cdd6;}
.live-dot.ok{background:var(--green);box-shadow:0 0 0 3px var(--green-soft);}
.live-dot.err{background:var(--red);}
.refresh-btn{
  font-size:12px;font-weight:500;color:var(--purple);
  background:var(--purple-soft);border:none;border-radius:6px;
  padding:6px 14px;cursor:pointer;transition:opacity .15s;
}
.refresh-btn:hover{opacity:.8;}
.n-badge{font-size:13px;color:var(--muted);}
.n-badge strong{font-size:22px;font-weight:600;color:var(--ink);letter-spacing:-.5px;}

/* ── VERDICT HERO ── */
.verdict-hero{
  background:var(--ink);border-radius:var(--r);
  padding:40px 44px;margin-bottom:56px;
  box-shadow:var(--shadow-md);
}
.verdict-hero .eyebrow{
  font-size:11px;font-weight:600;text-transform:uppercase;
  letter-spacing:.08em;color:rgba(255,255,255,.4);margin-bottom:12px;
}
.verdict-hero h2{
  font-size:26px;font-weight:600;color:#fff;
  letter-spacing:-.5px;line-height:1.3;margin-bottom:20px;
}
.verdict-hero .summary{
  font-size:15px;line-height:1.7;color:rgba(255,255,255,.8);
  max-width:820px;margin-bottom:32px;
}
.verdict-signals{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
@media(max-width:700px){.verdict-signals{grid-template-columns:1fr;}}
.vsig{border-top:1px solid rgba(255,255,255,.15);padding-top:14px;}
.vsig-label{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:rgba(255,255,255,.4);margin-bottom:6px;}
.vsig-val{font-size:20px;font-weight:600;letter-spacing:-.3px;margin-bottom:4px;}
.vsig-val.go{color:#34d399;}
.vsig-val.warn{color:#fbbf24;}
.vsig-val.risk{color:#f87171;}
.vsig-sub{font-size:12px;color:rgba(255,255,255,.5);line-height:1.5;}

/* ── PART HEADERS ── */
.part-header{
  display:flex;align-items:center;gap:12px;
  padding:18px 0 6px;
  border-top:2px solid var(--line);
  margin-bottom:8px;
}
.part-num{
  font-size:11px;font-weight:600;color:var(--purple);
  background:var(--purple-soft);padding:3px 10px;border-radius:20px;
  text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;
}
.part-title{font-size:20px;font-weight:600;color:var(--ink);letter-spacing:-.3px;}
.part-sub{font-size:13px;color:var(--muted);margin-bottom:28px;line-height:1.5;}

/* ── SECTION ── */
.section{margin-bottom:40px;}
.section-label{
  font-size:11px;font-weight:600;text-transform:uppercase;
  letter-spacing:.06em;color:var(--muted);margin-bottom:14px;
}

/* ── CARDS ── */
.card{
  background:var(--paper);border:1px solid var(--line);
  border-radius:var(--r);padding:22px 24px;
  box-shadow:var(--shadow-sm);
}
.card-head{
  font-size:11px;font-weight:600;text-transform:uppercase;
  letter-spacing:.06em;color:var(--muted);
  border-bottom:1px solid var(--line-soft);
  padding-bottom:10px;margin-bottom:16px;
}
.card.accent-green{border-top:3px solid var(--green);}
.card.accent-amber{border-top:3px solid var(--amber);}
.card.accent-red  {border-top:3px solid var(--red);}
.card.accent-blue {border-top:3px solid var(--blue);}
.card.accent-purple{border-top:3px solid var(--purple);}
.card.surface{background:var(--surface);}

/* ── STAT ── */
.stat-n{font-size:44px;font-weight:600;line-height:1;letter-spacing:-1.5px;color:var(--ink);}
.stat-n.green{color:var(--green);}
.stat-n.amber{color:var(--amber);}
.stat-n.red  {color:var(--red);}
.stat-n.blue {color:var(--blue);}
.stat-n.purple{color:var(--purple);}
.stat-label{font-size:11px;font-weight:500;color:var(--muted);margin-top:6px;text-transform:uppercase;letter-spacing:.05em;line-height:1.4;}
.stat-note{font-size:13px;color:var(--body);margin-top:8px;line-height:1.55;}

/* ── BARS ── */
.bar{margin-bottom:12px;}
.bar-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;}
.bar-label{font-size:13px;color:var(--ink);}
.bar-val{font-size:12px;font-weight:500;color:var(--muted);}
.bar-track{height:6px;background:var(--line-soft);border-radius:99px;overflow:hidden;}
.bar-fill{height:100%;border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.fill-green {background:var(--green);}
.fill-amber {background:var(--amber);}
.fill-red   {background:var(--red);}
.fill-blue  {background:var(--blue);}
.fill-purple{background:var(--purple);}
.fill-gray  {background:#c4cdd6;}

/* ── INSIGHT ── */
.insight{
  background:var(--surface);border:1px solid var(--line-soft);
  border-left:3px solid var(--purple);
  border-radius:0 var(--r) var(--r) 0;
  padding:14px 18px;margin:18px 0;
  font-size:13.5px;line-height:1.65;color:var(--body);
}
.insight b,.insight strong{color:var(--ink);font-weight:600;}
.insight-label{
  font-size:10.5px;font-weight:600;text-transform:uppercase;
  letter-spacing:.06em;color:var(--purple);display:block;margin-bottom:5px;
}

/* ── CALLOUT (decision-ready) ── */
.callout{
  display:flex;gap:14px;align-items:flex-start;
  background:var(--surface);border:1px solid var(--line);
  border-radius:var(--r);padding:16px 18px;margin-bottom:12px;
}
.callout-icon{font-size:18px;flex-shrink:0;margin-top:1px;}
.callout-body{font-size:13.5px;line-height:1.65;color:var(--body);}
.callout-body strong{color:var(--ink);}

/* ── TENSION ── */
.tension{
  display:grid;grid-template-columns:1fr 32px 1fr;
  border:1px solid var(--line);border-radius:var(--r);
  overflow:hidden;margin:16px 0;
}
.tension-side{padding:20px 22px;font-size:13.5px;line-height:1.65;}
.tension-side.left {background:var(--green-soft);}
.tension-side.right{background:var(--amber-soft);}
.tension-mid{background:var(--surface);border-left:1px solid var(--line);border-right:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:16px;}
.tension-tag{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.tension-tag.green{color:var(--green);}
.tension-tag.amber{color:#92650a;}

/* ── TAGS ── */
.tag{display:inline-block;font-size:11px;font-weight:500;padding:2px 9px;border-radius:20px;}
.tag.green {background:var(--green-soft);color:var(--green);}
.tag.amber {background:var(--amber-soft);color:#92650a;}
.tag.red   {background:var(--red-soft);color:#c0283f;}
.tag.blue  {background:var(--blue-soft);color:var(--blue);}
.tag.purple{background:var(--purple-soft);color:var(--purple);}
.tag.gray  {background:var(--surface);color:var(--muted);border:1px solid var(--line);}

/* ── TABLES ── */
.tbl{width:100%;border-collapse:collapse;font-size:13px;}
.tbl th{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);border-bottom:2px solid var(--line);padding:8px 12px;text-align:left;}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--line-soft);vertical-align:middle;color:var(--body);}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:var(--surface);}
.tbl .num{font-weight:600;color:var(--ink);}
.tbl .sub{font-size:11px;color:var(--muted);font-weight:400;}

/* ── QUOTE CARDS ── */
.quote-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:700px){.quote-grid{grid-template-columns:1fr;}}
.qcard{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow-sm);}
.qcard-text{font-size:13.5px;font-style:italic;color:var(--ink);line-height:1.65;}
.qcard-meta{font-size:11px;color:var(--muted);margin-top:8px;}

/* ── PROFILE CARDS ── */
.profile-card{
  background:var(--paper);border:1px solid var(--line);
  border-radius:var(--r);padding:18px 20px;
  box-shadow:var(--shadow-sm);
}
.profile-card.highlight{border-top:3px solid var(--green);}
.profile-card.churned{border-top:3px solid var(--amber);}
.profile-name{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:4px;}
.profile-meta{font-size:11px;color:var(--muted);margin-bottom:10px;}
.profile-row{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid var(--line-soft);}
.profile-row:last-child{border-bottom:none;}
.profile-row .k{color:var(--muted);}
.profile-row .v{color:var(--ink);font-weight:500;text-align:right;max-width:60%;}

/* ── COLLAPSIBLE SECTIONS (Part 5) ── */
details{margin-bottom:12px;}
details summary{
  display:flex;align-items:center;gap:10px;
  padding:14px 18px;background:var(--surface);
  border:1px solid var(--line);border-radius:var(--r);
  cursor:pointer;font-size:14px;font-weight:500;color:var(--ink);
  list-style:none;transition:background .15s;
}
details summary::-webkit-details-marker{display:none;}
details summary::after{content:'›';margin-left:auto;font-size:18px;color:var(--muted);transition:transform .2s;}
details[open] summary{border-radius:var(--r) var(--r) 0 0;background:var(--paper);}
details[open] summary::after{transform:rotate(90deg);}
details summary:hover{background:var(--line-soft);}
.details-body{
  border:1px solid var(--line);border-top:none;
  border-radius:0 0 var(--r) var(--r);
  padding:20px 22px;background:var(--paper);
}

/* ── RISK TABLE ── */
.risk-row{
  display:grid;grid-template-columns:28px 1fr auto;
  gap:12px;align-items:start;
  padding:14px 0;border-bottom:1px solid var(--line-soft);
}
.risk-row:last-child{border-bottom:none;}
.risk-icon{font-size:16px;margin-top:1px;}
.risk-body{font-size:13.5px;line-height:1.6;color:var(--body);}
.risk-body strong{color:var(--ink);display:block;margin-bottom:3px;}
.risk-sev{font-size:11px;font-weight:500;white-space:nowrap;margin-top:2px;}

/* ── REQUIREMENT ROWS ── */
.req{
  display:grid;grid-template-columns:1fr auto auto;
  gap:12px;align-items:center;
  padding:13px 0;border-bottom:1px solid var(--line-soft);
  font-size:13.5px;
}
.req:last-child{border-bottom:none;}
.req-text{color:var(--body);}
.req-text strong{color:var(--ink);display:block;margin-bottom:2px;}
.req-src{font-size:11px;color:var(--muted);white-space:nowrap;}

/* ── DOT STATUS ── */
.dot{width:10px;height:10px;border-radius:50%;display:inline-block;vertical-align:middle;margin-right:6px;}
.dot.green{background:var(--green);}
.dot.amber{background:var(--amber);}
.dot.red  {background:var(--red);}

/* ── DIVIDER ── */
.divider{height:1px;background:var(--line);margin:48px 0;}

/* ── LOADING / ERROR ── */
#loading{text-align:center;padding:80px 0;color:var(--muted);font-size:14px;}
#err-msg{display:none;padding:16px 20px;background:var(--red-soft);border:1px solid var(--red);border-radius:var(--r);color:#c0283f;font-size:13px;margin-bottom:24px;}

/* ── SPARKLINE (inline text chart) ── */
.spark{display:inline-flex;align-items:flex-end;gap:2px;height:24px;vertical-align:middle;margin:0 4px;}
.spark span{width:6px;background:var(--purple);border-radius:2px 2px 0 0;opacity:.7;}

footer{font-size:12px;color:var(--muted);border-top:1px solid var(--line);padding-top:20px;margin-top:80px;line-height:1.6;}
</style>
</head>
<body>
<div class="page">

<!-- TOP NAV -->
<div class="topnav">
  <h1>Is this worth building?</h1>
  <div class="topnav-right">
    <div class="live-badge">
      <div class="live-dot" id="live-dot"></div>
      <span id="live-status">Loading…</span>
    </div>
    <div class="n-badge"><strong id="n-total">—</strong> responses</div>
    <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
  </div>
</div>

<div id="err-msg"></div>
<div id="loading">Fetching live data from Google Sheets…</div>
<div id="app" style="display:none;"></div>

<footer>
  Source: Google Sheets (published CSV) · Refreshes on load or on ↻ · N is small — all figures are directional signals, not statistically significant findings · Built for internal strategic review.
</footer>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTM1uGoKXTC_VmMykWJpXNRsHKs8_u-1wuZjncz6Pu7P7JkJ8YPb02kPS-MLWFWqFtAZZhwSyyPeud9/pub?gid=0&single=true&output=csv";

// ── CSV PARSER ──────────────────────────────────────────────────
function parseCSV(text){
  const rows=[];let row=[];let field='';let inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i],n=text[i+1];
    if(inQ){if(c==='"'&&n==='"'){field+='"';i++;}else if(c==='"'){inQ=false;}else field+=c;}
    else{if(c==='"'){inQ=true;}else if(c===','){row.push(field);field='';}else if(c==='\r'){}else if(c==='\n'){row.push(field);rows.push(row);row=[];field='';}else field+=c;}
  }
  if(field.length||row.length){row.push(field);rows.push(row);}
  return rows;
}
function toObjects(rows){
  const h=rows[0];
  return rows.slice(1).filter(r=>r.length>1&&r.some(c=>c!=='')).map(r=>{
    const o={};h.forEach((k,i)=>o[k]=r[i]||'');return o;
  });
}

// ── COLUMN KEYS ─────────────────────────────────────────────────
const K = {
  Q1:  'Q1. Do you currently invest or trade stocks?',
  Q2A: 'Q2A. How much time per week do you spend on stock research?',
  Q4A: 'Q4A. What is your single biggest frustration with your current research process?',
  Q5A: 'Q5A. Have you paid for any premium financial tools, newsletters, or data platforms in the last 12 months?',
  Q5s: 'Q5A_sub. Roughly how much do you spend per month on financial tools?',
  Q6:  'Q6. How much do you trust AI to assist you with investment analysis?',
  Q7:  'Q7. What do you do professionally?\n',
  Q8:  'Q8. Where are you primarily based?',
  Q9:  'Q9. If you could wave a magic wand and fix one single thing about how you research stocks today, what would it be?',
  Q10: 'Q10. Can we drop you a line if we have a quick, specific question about your answers?',
  Q2C: 'Q2C. Fair enough! If there was just one thing that could make you interested in the stock market, what would it be?',
  AI_USE: 'Q3A. Which tools do you currently use for stock analysis? (AI Tools (ChatGPT, Perplexity, Claude))',
  TOOLS: [
    ['Q3A. Which tools do you currently use for stock analysis? (Yahoo Finance)','Yahoo Finance'],
    ['Q3A. Which tools do you currently use for stock analysis? (TradingView)','TradingView'],
    ['Q3A. Which tools do you currently use for stock analysis? (Morningstar / Seeking Alpha)','Morningstar/Seeking Alpha'],
    ['Q3A. Which tools do you currently use for stock analysis? (Bloomberg Terminal / Reuters Eikon)','Bloomberg/Reuters'],
    ['Q3A. Which tools do you currently use for stock analysis? (AI Tools (ChatGPT, Perplexity, Claude))','AI Tools'],
    ['Q3A. Which tools do you currently use for stock analysis? (Social Media (Reddit, X, LinkedIn))','Social Media'],
    ["Q3A. Which tools do you currently use for stock analysis? (My broker's built-in charting/tools)","Broker's tools"],
  ],
  BARRIERS: [
    ['Q2B. What is the main barrier holding you back from making your first stock investment? (It feels too complicated — I don\'t know how to analyze a company)','Too complicated'],
    ['Q2B. What is the main barrier holding you back from making your first stock investment? (Fear of losing money — the market feels too volatile right now)','Fear of losing money'],
    ['Q2B. What is the main barrier holding you back from making your first stock investment? (Capital — I don\'t have enough money saved to start yet)','Not enough capital'],
    ['Q2B. What is the main barrier holding you back from making your first stock investment? (Time — I don\'t have hours to spare to learn finance jargon)','No time to learn'],
    ['Q2B. What is the main barrier holding you back from making your first stock investment? (Trust — I don\'t trust standard financial platforms or brokers)','Don\'t trust platforms'],
  ],
  FEATURES: [
    ['Q3B. What would give you the confidence to take your very first step? (A simple institutional score — telling me if a stock is healthy or not in seconds)','Simple health score'],
    ['Q3B. What would give you the confidence to take your very first step? (Plain-language explanations in your native language — zero confusing financial jargon)','Plain-language explanations'],
    ['Q3B. What would give you the confidence to take your very first step? (An AI assistant — that I can ask direct questions to and get verifiable answers)','AI assistant (Q&A)'],
    ['Q3B. What would give you the confidence to take your very first step? (Micro-investing — the ability to start with as little as $5)','Micro-investing ($5 start)'],
    ['Q3B. What would give you the confidence to take your very first step? (Educational modules — bite-sized lessons built directly into the workflow)','Educational modules'],
  ],
};

// ── HELPERS ─────────────────────────────────────────────────────
const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const pct = (n,d) => d ? Math.round(100*n/d) : 0;
const isTrue = v => (v||'').trim().toUpperCase()==='TRUE';

function bar(label, n, total, cls='fill-green', note=''){
  const p = pct(n,total);
  return `<div class="bar">
    <div class="bar-top"><span class="bar-label">${esc(label)}</span><span class="bar-val">${n} <span style="color:var(--muted);font-weight:400">(${p}%)</span>${note?` <span style="font-size:11px;color:var(--muted)">${note}</span>`:''}</span></div>
    <div class="bar-track"><div class="bar-fill ${cls}" style="width:${p}%"></div></div>
  </div>`;
}

function tag(text, cls='gray'){return `<span class="tag ${cls}">${esc(text)}</span>`;}
function dot(cls){return `<span class="dot ${cls}"></span>`;}

function countField(rows, key){
  const m={};
  rows.forEach(r=>{const v=(r[key]||'').trim();if(v)m[v]=(m[v]||0)+1;});
  return Object.entries(m).sort((a,b)=>b[1]-a[1]);
}
function countBool(rows, pairs){
  return pairs.map(([k,lbl])=>({lbl, n:rows.filter(r=>isTrue(r[k])).length}))
    .sort((a,b)=>b.n-a.n);
}
function shortTrust(v){
  if((v||'').includes('Moderately')) return 'Conditional (source req.)';
  if((v||'').includes('Skeptical'))  return 'Skeptical';
  if((v||'').includes('Fully'))      return 'Full trust';
  if((v||'').includes('Not at all')) return 'Not at all';
  return v||'';
}
function shortFrust(v){
  if((v||'').includes('scattered')) return 'Scattered/too many tabs';
  if((v||'').includes('signal'))    return 'Signal/noise';
  if((v||'').includes('Complexity')) return 'Signal/noise';
  if((v||'').includes('quality'))   return 'AI hallucinations';
  if((v||'').includes('too long'))  return 'Too slow';
  if((v||'').includes('Cost'))      return 'Cost';
  if((v||'').includes('clue'))      return 'No idea where to start';
  return v||'';
}

// ── MAIN RENDER ─────────────────────────────────────────────────
function render(rows){
  const N = rows.length;

  // Segment
  const investors   = rows.filter(r=>r[K.Q1].startsWith('Yes'));

      <tr><th>Category</th><th>What to look for in responses</th></tr>
      <tr><td>Information overload / too many sources</td><td>Too many tools, conflicting signals, analysis paralysis</td></tr>
      <tr><td>Jargon / comprehension barrier</td><td>Not understanding terms, ratios, financial statements</td></tr>
      <tr><td>Time constraint</td><td>Not having time, research being slow</td></tr>
      <tr><td>Trust / credibility concern</td><td>Not trusting sources, biased information</td></tr>
      <tr><td>Capital / cost barrier</td><td>Not having money, fees, minimums</td></tr>
      <tr><td>Lack of personalised guidance</td><td>Wanting tailored advice, not knowing what applies to them</td></tr>
      <tr><td>Emotional / fear-driven</td><td>Fear, anxiety, risk aversion not tied to a specific mechanic</td></tr>
      <tr><td>Other / uncategorised</td><td>Anything not fitting above — review for new emerging themes</td></tr>
    </table>
    <p style="font-size:12px;color:var(--muted);margin-top:10px;">Tag each response with one primary code. This turns open text into a frequency chart without forcing respondents into your categories upfront.</p>

    <div class="insight" style="margin-top:16px;">
      <span class="insight-label">Compatibility note</span>
      Wave 2 uses forced single-choice for barriers instead of multi-select. This means <strong>Wave 1 and Wave 2 barrier data cannot be directly merged</strong> — they measured the same thing differently. You can compare themes qualitatively, but not percentages numerically. Keep the datasets separate and note this when presenting combined findings.
    </div>
  </div>
  </details>`;

  html += `<details>
  <summary>⚠ Methodology — what this data can and can't claim</summary>
  <div class="details-body">
    <div class="g2">
      <div>
        <p style="font-size:13px;font-weight:600;color:var(--ink);margin-bottom:8px;">What it can claim</p>
        <ul style="font-size:13px;line-height:1.8;color:var(--body);padding-left:18px;">
          <li>Pain is real — 100% of investors report a frustration</li>
          <li>Signal/noise is the dominant pain across segments</li>
          <li>AI trust is conditional on citations — specific, actionable</li>
          <li>Simplification unlocks aspirers — confirmed by two independent questions</li>
          <li>5 people proved WTP through revealed preference</li>
        </ul>
      </div>
      <div>
        <p style="font-size:13px;font-weight:600;color:var(--ink);margin-bottom:8px;">What it cannot claim</p>
        <ul style="font-size:13px;line-height:1.8;color:var(--body);padding-left:18px;">
          <li>Representative of the total market (sample = founder network)</li>
          <li>Pricing or WTP at a specific price point</li>
          <li>Whether non-investors would pay (only that they'd find it useful)</li>
          <li>Causation — correlations only, n too small for significance</li>
          <li>What "simple enough" looks like in practice</li>
        </ul>
      </div>
    </div>
    <div class="insight" style="margin-top:16px;">
      <span class="insight-label">Statistical honesty</span>
      Once split by segment and sub-category, most cells have single-digit counts. A move from 2 to 3 people is a 50% increase that is statistically meaningless. All figures are directional signals — treat them as hypotheses to test, not facts to cite.
    </div>
  </div>
  </details>`;

// ── LOAD DATA ────────────────────────────────────────────────────
// Renders immediately from static snapshot, then silently refreshes from live sheet.
// This means the file works from file:// (no CORS) AND updates when new responses come in.
async function loadData(){
  // 1. Render static snapshot instantly — no network needed
  const staticRows = toObjects(STATIC_ROWS);
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('n-total').textContent = staticRows.length;
  document.getElementById('live-dot').className='live-dot';
  document.getElementById('live-status').textContent='Snapshot · refreshing…';
  render(staticRows);

  // 2. Try live fetch silently in background
  try{
    const res = await fetch(CSV_URL, {cache:'no-store'});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const text = await res.text();
    const liveRows = toObjects(parseCSV(text));
    // Only re-render if we got more rows than the snapshot (new responses)
    document.getElementById('n-total').textContent = liveRows.length;
    document.getElementById('live-dot').className='live-dot ok';
    document.getElementById('live-status').textContent='Live · '+new Date().toLocaleTimeString();
    render(liveRows);
  } catch(e){
    // Stay on snapshot silently — just update status
    document.getElementById('live-dot').className='live-dot';
    document.getElementById('live-status').textContent='Snapshot '+staticRows.length+' resp · live fetch failed';
  }
}

loadData();
</script>
